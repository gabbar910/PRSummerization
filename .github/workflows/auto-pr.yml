name: Auto PR on Feature Push

on:
  push:
    branches:
      - 'feature/**'

jobs:
  auto-create-pr:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Git
      run: |
        git fetch origin dev

    - name: Generate git diff
      run: |
        git diff origin/dev > changes.diff
        
    - name: Generate PR Summary (AI)
      id: summarize
      run: |
        DIFF_CONTENT=$(cat changes.diff | head -c 6000 | jq -Rs .)
        echo "## 🔍 Summary" > summary.md
        echo "Auto-generated summary goes here. $DIFF_CONTENT" >> summary.md
        # Optional: Use curl or Python to call OpenAI/GPT API here

    - name: Install GitHub CLI
      run: |
        sudo apt install gh -y

    - name: Authenticate GitHub CLI
      run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

    - name: Create Pull Request
      run: |
        gh pr create \
          --base dev \
          --head ${{ github.ref_name }} \
          --title "Auto PR: ${{ github.ref_name }}" \
          --body-file summary.md || echo "PR may already exist"
